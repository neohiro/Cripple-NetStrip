name: Auto-Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g., v2.0.2)'
        required: true
        default: 'v2.0.2'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        run: |
          cmd.exe /c build.bat
          Compress-Archive -Path "dist\Cripple\*" -DestinationPath "NetStrip-Windows.zip" -Force

      - name: Build macOS / Linux Executable
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x build.sh
          bash build.sh
          cd dist
          zip -r ../NetStrip-${{ runner.os }}.zip ./*

      - name: Upload Release Asset
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            NetStrip-Windows.zip
            NetStrip-${{ runner.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
