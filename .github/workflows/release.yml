name: Auto-Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g., v3.0.4)'
        required: true
        default: 'v3.0.4'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y zip unzip autoconf libtool libltdl-dev automake autotools-dev m4 pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake libstdc++6
          rustup target add aarch64-linux-android || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Pillow pyinstaller buildozer "cython==0.29.33" virtualenv maturin

      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          cmd.exe /c build.bat
          Compress-Archive -Path "dist\Cripple" -DestinationPath "NetStrip-${env:RELEASE_TAG}-Windows.zip" -Force

      - name: Build macOS / Linux Executable
        if: matrix.os != 'windows-latest'
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          chmod +x build.sh run.sh
          bash build.sh
          if [ "${{ runner.os }}" = "macOS" ]; then
            cd dist
            zip -r ../NetStrip-${RELEASE_TAG}-macOS.zip NetStrip.app
            cd ..
          else
            cd dist
            zip -r ../NetStrip-${RELEASE_TAG}-Linux.zip NetStrip
            cd ..
          fi

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          yes | buildozer android debug
          mv bin/*.apk bin/NetStrip-${RELEASE_TAG}-Android.apk
          cd bin
          zip ../NetStrip-${RELEASE_TAG}-Android.zip NetStrip-${RELEASE_TAG}-Android.apk
          cd ..
          
      - name: Upload Release Asset (Windows Binaries)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            NetStrip-*-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (macOS / Linux Binaries)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            NetStrip-*-macOS.zip
            NetStrip-*-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Android Zip)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: NetStrip-*-Android.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
