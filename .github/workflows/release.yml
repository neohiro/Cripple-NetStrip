name: Auto-Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g., v3.0.2)'
        required: true
        default: 'v3.0.2'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libstdc++6

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Pillow pyinstaller buildozer cython virtualenv

      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        run: |
          cmd.exe /c build.bat
          Compress-Archive -Path "dist\Cripple" -DestinationPath "NetStrip-Windows-Binaries.zip" -Force
          Compress-Archive -Path "netstrip", "main.py", "run.bat", "requirements.txt", "assets" -DestinationPath "NetStrip-Windows-Runfiles.zip" -Force

      - name: Build macOS / Linux Executable
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x build.sh run.sh
          bash build.sh
          cd dist
          zip -r ../NetStrip-${{ runner.os }}-Binaries.zip ./*
          cd ..
          zip -r NetStrip-${{ runner.os }}-Runfiles.zip netstrip/ main.py run.sh requirements.txt assets/

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: |
          yes | buildozer android debug || true
          
      - name: Upload Release Asset (Windows Binaries)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            NetStrip-Windows-Binaries.zip
            NetStrip-Windows-Runfiles.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (macOS / Linux Binaries)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            NetStrip-${{ runner.os }}-Binaries.zip
            NetStrip-${{ runner.os }}-Runfiles.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Android APK)
        if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
